services:

  app:

    build: .

    ports:
      - "8000:8000"

    environment:
      OLLAMA_API_BASE_URL: http://ollama:11434

    depends_on:
      ollama-init:
        condition: service_completed_successfully


  ollama:

    image: ollama/ollama

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10


  ollama-init:

    image: ollama/ollama

    depends_on:
      ollama:
        condition: service_healthy

    volumes:
      - ollama_data:/root/.ollama

    entrypoint:
      - /bin/sh
      - -c

    command: |
      ollama pull gemma3:4b

volumes:

  ollama_data: