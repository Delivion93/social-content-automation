<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Content Agents</title>
    <script src="/static/js/generate.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #121212;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 1200px;
            max-width: 95%;
        }

        .card {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 20px;
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            margin-top: 15px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #2c2c2c;
            color: white;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .loading {
            margin-top: 15px;
            color: #aaa;
        }

        #form-container {
            display: block;
        }

        #loading-screen {
            display: none;
            text-align: center;
            padding: 80px 20px;
        }

       #chat-container {
            display: none;
            height: 95vh;
            flex-direction: column;
            overflow: hidden;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 6px solid #333;
            border-top: 6px solid #2563eb;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            padding: 20px;
        }

        .message {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            white-space: pre-wrap;

            width: 100%;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 15px;
            border-top: 1px solid #333;
            flex-shrink: 0;
        }

        #chat-input {
            flex: 1;
        }
        #drawing-area {
            margin-top: 30px;
            height: 400px;
            border-radius: 15px;
            overflow: hidden;
            background: black;
        }

        #canvasCarga {
            width: 100%;
            height: 100%;
            display: block;
        }

        #view-results-btn {
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">

    <div id="form-container" class="card">

        <h1>🤖 Social Content Agents</h1>

        <label>Producto</label>
        <input type="text" id="product">

        <label>Audiencia</label>
        <input type="text" id="audience">

        <label>Descripción de marca</label>
        <textarea id="brandDescription"></textarea>

        <button onclick="generateCampaign()">
            Generar campaña
        </button>

        <div id="loading" class="loading"></div>

    </div>

    <div id="loading-screen" class="card">

        <h1 id="loading-title">
            🤖 Generando campaña...
        </h1>

        <div class="loader"></div>

        <p id="loading-subtitle">
            Nuestros agentes están trabajando...
        </p>

        <button
            id="view-results-btn"
            onclick="showGeneratedResults()"
            style="display:none"
        >
            Ver resultados
        </button>

        <div id="drawing-area">

            <canvas id="canvasCarga"></canvas>

        </div>

    </div>

<div id="chat-container" class="card">

    <h1>💬 Campaign Assistant</h1>

<div id="chat-messages"></div>

<div class="chat-input-area">

    <input
        type="text"
        id="chat-input"
        placeholder="Escribe una modificación..."
    >

    <button onclick="sendChatMessage()">
        Enviar
    </button>

</div>

</div>
</div>
</body>
</html>
