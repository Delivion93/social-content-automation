<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Content Agents</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #121212;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 1200px;
            max-width: 95%;
        }

        .card {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 20px;
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            margin-top: 15px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #2c2c2c;
            color: white;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .loading {
            margin-top: 15px;
            color: #aaa;
        }

        #form-container {
            display: block;
        }

        #loading-screen {
            display: none;
            text-align: center;
            padding: 80px 20px;
        }

       #chat-container {
            display: none;
            height: 95vh;
            flex-direction: column;
            overflow: hidden;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 6px solid #333;
            border-top: 6px solid #2563eb;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            padding: 20px;
        }

        .message {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            white-space: pre-wrap;

            width: 100%;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 15px;
            border-top: 1px solid #333;
            flex-shrink: 0;
        }

        #chat-input {
            flex: 1;
        }
    </style>
</head>
<body>

<div class="container">

    <div id="form-container" class="card">

        <h1>🤖 Social Content Agents</h1>

        <label>Producto</label>
        <input type="text" id="product">

        <label>Audiencia</label>
        <input type="text" id="audience">

        <label>Descripción de marca</label>
        <textarea id="brandDescription"></textarea>

        <button onclick="generateCampaign()">
            Generar campaña
        </button>

        <div id="loading" class="loading"></div>

    </div>

    <div id="loading-screen" class="card">

    <h1>🤖 Generando campaña...</h1>

    <div class="loader"></div>

    <p>
        Nuestros agentes están trabajando...
    </p>

</div>

<div id="chat-container" class="card">

    <h1>💬 Campaign Assistant</h1>

<div id="chat-messages"></div>

<div class="chat-input-area">

    <input
        type="text"
        id="chat-input"
        placeholder="Escribe una modificación..."
    >

    <button onclick="sendChatMessage()">
        Enviar
    </button>

</div>

</div>
</div>

<script>

async function generateCampaign() {

    document.getElementById(
        "form-container"
    ).style.display = "none";

    document.getElementById(
        "loading-screen"
    ).style.display = "block";

    try {

        const response = await fetch(
            "/generate-content",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    product:
                        document.getElementById("product").value,

                    audience:
                        document.getElementById("audience").value,

                    brand_description:
                        document.getElementById("brandDescription").value
                })
            }
        );

        const data = await response.json();

        showResult(data);

    } catch (error) {

        alert("Error generating campaign");

        console.error(error);
    }
}

function showResult(data) {

    document.getElementById(
        "loading-screen"
    ).style.display = "none";

    document.getElementById(
        "chat-container"
    ).style.display = "flex";

    const chat =
        document.getElementById(
            "chat-messages"
        );

    chat.innerHTML = "";

    const campaignResult = `
📢 Campaign Name

${data.campaign_name}

────────────────────────

🎯 Concept

${data.concept}

────────────────────────

🎨 Tone

${data.tone}

────────────────────────

📸 Instagram

${data.instagram_post}

────────────────────────

📘 Facebook

${data.facebook_post}

────────────────────────

💼 LinkedIn

${data.linkedin_post}

────────────────────────

${data.approved
    ? "✅ Compliance Approved"
    : "❌ Compliance Rejected"}
`;

    addMessage(chat, campaignResult);
}

function addMessage(chat, text) {

    const msg =
        document.createElement("div");

    msg.className = "message";

    msg.textContent = text;

    chat.appendChild(msg);

    chat.scrollTop = chat.scrollHeight;
}

async function sendChatMessage() {

    const input =
        document.getElementById(
            "chat-input"
        );

    const text =
        input.value.trim();

    if (!text) return;

    addMessage(
        document.getElementById(
            "chat-messages"
        ),
        "👤 " + text
    );

    input.value = "";

}

</script>

</body>
</html>
