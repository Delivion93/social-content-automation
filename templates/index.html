<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Content Agents</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #121212;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 30px;
        }

        .container {
            width: 1000px;
            max-width: 95%;
        }

        .card {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 20px;
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            margin-top: 15px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #2c2c2c;
            color: white;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .loading {
            margin-top: 15px;
            color: #aaa;
        }

        .section {
            margin-top: 20px;
        }

        .content-box {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            white-space: pre-wrap;
        }

        #results {
            display: none;
        }

        .approved {
            color: #22c55e;
            font-weight: bold;
        }

        .rejected {
            color: #ef4444;
            font-weight: bold;
        }

        #form-container {
            display: block;
        }

        #loading-screen {
            display: none;
            text-align: center;
            padding: 80px 20px;
        }

        #chat-container {
            display: none;
            height: 80vh;
            flex-direction: column;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 6px solid #333;
            border-top: 6px solid #2563eb;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">

    <div id="form-container" class="card">

        <h1>🤖 Social Content Agents</h1>

        <label>Producto</label>
        <input type="text" id="product">

        <label>Audiencia</label>
        <input type="text" id="audience">

        <label>Descripción de marca</label>
        <textarea id="brandDescription"></textarea>

        <button onclick="generateCampaign()">
            Generar campaña
        </button>

        <div id="loading" class="loading"></div>

    </div>

    <div id="loading-screen" class="card">

    <h1>🤖 Generando campaña...</h1>

    <div class="loader"></div>

    <p>
        Nuestros agentes están trabajando...
    </p>

</div>

<div id="chat-container" class="card">

    <h1>💬 Campaign Assistant</h1>

    <div id="chat-messages"></div>

</div>
</div>

<script>

async function generateCampaign() {

    document.getElementById(
        "form-container"
    ).style.display = "none";

    document.getElementById(
        "loading-screen"
    ).style.display = "block";

    try {

        const response = await fetch(
            "/generate-content",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    product:
                        document.getElementById("product").value,

                    audience:
                        document.getElementById("audience").value,

                    brand_description:
                        document.getElementById("brandDescription").value
                })
            }
        );

        const data = await response.json();

        showResult(data);

    } catch (error) {

        alert("Error generating campaign");

        console.error(error);
    }
}

function showResult(data) {

    document.getElementById(
        "loading-screen"
    ).style.display = "none";

    document.getElementById(
        "chat-container"
    ).style.display = "block";

    const chat =
        document.getElementById(
            "chat-messages"
        );

    chat.innerHTML = "";

    addMessage(
        chat,
        "📢 Campaign Name\n\n" +
        data.campaign_name
    );

    addMessage(
        chat,
        "🎯 Concept\n\n" +
        data.concept
    );

    addMessage(
        chat,
        "🎨 Tone\n\n" +
        data.tone
    );

    addMessage(
        chat,
        "📸 Instagram\n\n" +
        data.instagram_post
    );

    addMessage(
        chat,
        "📘 Facebook\n\n" +
        data.facebook_post
    );

    addMessage(
        chat,
        "💼 LinkedIn\n\n" +
        data.linkedin_post
    );

    addMessage(
        chat,
        data.approved
            ? "✅ Compliance Approved"
            : "❌ Compliance Rejected"
    );
}

function addMessage(chat, text) {

    const msg =
        document.createElement("div");

    msg.className = "message";

    msg.textContent = text;

    chat.appendChild(msg);
}

</script>

</body>
</html>
